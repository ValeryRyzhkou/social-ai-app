services:
  postgres:
    image: postgres:16-alpine
    container_name: social-ai-postgres
    environment:
      POSTGRES_USER: socialuser
      POSTGRES_PASSWORD: socialpass123
      POSTGRES_DB: socialdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: